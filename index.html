<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AVBO Corse — VR Showroom</title>
    
    <!-- STILI SCHERMATA DI CARICAMENTO -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@600;800&display=swap');
      
      #loading-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #050a14;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-family: 'Exo 2', sans-serif;
        transition: opacity 0.6s ease-out;
      }
      .loader-logo {
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: 4px;
        margin-bottom: 5px;
        color: #00d5ff;
        text-shadow: 0 0 15px rgba(0, 213, 255, 0.4);
      }
      .loader-subtitle {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 2px;
        margin-bottom: 35px;
        color: #aaddff;
      }
      .progress-container {
        width: 280px;
        height: 6px;
        background-color: #1a1a1a;
        border-radius: 3px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(204, 68, 255, 0.2);
        position: relative;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00d5ff, #cc44ff);
        transition: width 0.2s ease-out;
        border-radius: 3px;
      }
    </style>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>

    // ── Rotazione Y con pause/snap/resume ────────────────────────────────────
    AFRAME.registerComponent('rotate-y', {
      schema: { speed: { type: 'number', default: 0.25 } },
      init: function () {
        this._paused   = false;
        this._snapping = false;
        this._snapTgt  = 0;
      },
      pauseSnap: function () {
        this._paused   = true;
        this._snapping = true;
        this._snapTgt  = THREE.MathUtils.degToRad(35); // 3/4 view inclinato
      },
      resume: function () {
        this._paused   = false;
        this._snapping = false;
      },
      tick: function (time, delta) {
        const obj = this.el.object3D;
        if (this._snapping) {
          let diff = this._snapTgt - obj.rotation.y;
          while (diff >  Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          if (Math.abs(diff) < 0.01) {
            obj.rotation.y = this._snapTgt;
            this._snapping = false;
          } else {
            obj.rotation.y += diff * Math.min(delta / 350, 1);
          }
          return;
        }
        if (this._paused) return;
        obj.rotation.y += THREE.MathUtils.degToRad(this.data.speed) * (delta / 1000) * 60;
      }
    });

    // ── Piattaforma: stop rotazione + mostra/nasconde hotspot per prossimità ──
    AFRAME.registerComponent('car-platform', {
      init: function () {
        this._active     = false;
        this._leaveTimer = null;
        // Vettori riutilizzabili — no new THREE.Vector3() ogni tick
        this._platPos = new THREE.Vector3();
        this._camPos  = new THREE.Vector3();
        this._camDir  = new THREE.Vector3();
        this._toPlat  = new THREE.Vector3();
      },
      tick: function (time, delta) {
        // [OTTIMIZZAZIONE]: Calcola la prossimità solo ogni 150ms per limitare il CPU lag
        this._t = (this._t || 0) + delta;
        if (this._t < 150) return;
        this._t = 0;

        // Lazy lookup camera
        if (!this._camEl) {
          this._camEl = document.getElementById('cam');
          if (!this._camEl) return;
        }

        this.el.object3D.getWorldPosition(this._platPos);
        this._camEl.object3D.getWorldPosition(this._camPos);

        // getWorldDirection restituisce +Z, la camera guarda -Z → neghiamo
        this._camEl.object3D.getWorldDirection(this._camDir);
        this._camDir.negate();

        this._toPlat.subVectors(this._platPos, this._camPos);
        const dist = this._toPlat.length();
        const dot  = this._camDir.dot(this._toPlat.normalize());

        // Attiva se: vicino (<8m) E guarda verso la piattaforma (angolo <40°)
        const looking = dist < 8.0 && dot > 0.82;

        if (looking && !this._active) {
          if (this._leaveTimer) { clearTimeout(this._leaveTimer); this._leaveTimer = null; }
          this._active = true;
          // Mostra gli hotspot quando si guarda la macchina (senza fermare la rotazione)
          setTimeout(() => {
            this.el.querySelectorAll('[hotspot]').forEach(h => {
              if (h.components.hotspot) h.components.hotspot.setVisible(true);
            });
          }, 150);
        } else if (!looking && this._active) {
          if (this._leaveTimer) return;
          this._leaveTimer = setTimeout(() => {
            this._leaveTimer = null;
            if (!this._active) return;
            this._active = false;
            this.el.querySelectorAll('[hotspot]').forEach(h => {
              if (h.components.hotspot) h.components.hotspot.setVisible(false);
            });
          }, 200);
        }
      }
    });

    // ── Pannelli gaze generici (per i 4 pannelli info del viewer) ─────────────
    AFRAME.registerComponent('gaze-body', {
      schema: { duration: { type: 'number', default: 350 } },
      init: function () {
        this._s = 0; this._t = 0;
        this.el.object3D.scale.set(0, 0, 0);
      },
      tick: function (time, delta) {
        if (Math.abs(this._s - this._t) < 0.005) {
          this._s = this._t; this.el.object3D.scale.setScalar(this._s); return;
        }
        this._s += (this._t - this._s) * Math.min((delta / this.data.duration) * 5, 1);
        this.el.object3D.scale.setScalar(this._s);
      }
    });

    // ── Hotspot sulla macchina ────────────────────────────────────────────────
    // Nasce nascosto. setVisible() controllato da car-platform.
    // Gaze sul dot → mostra pannello info.
    AFRAME.registerComponent('hotspot', {
      schema: {
        title: { type: 'string', default: 'Info' },
        body:  { type: 'string', default: '' },
        color: { type: 'color',  default: '#cc44ff' }
      },
      init: function () {
        const d = this.data;
        this._visible  = false;
        this._visScale = 0;
        this._panelOpen = 0;
        this._panelTgt  = 0;
        this._pulseT    = Math.random() * 1600;

        // Anello pulsante
        this.ring = document.createElement('a-torus');
        this.ring.setAttribute('radius', '0.13');
        this.ring.setAttribute('radius-tubular', '0.013');
        this.ring.setAttribute('rotation', '90 0 0');
        this.ring.setAttribute('material',
          `color:${d.color}; emissive:${d.color}; emissiveIntensity:1.2; shader:flat; transparent:true; opacity:1`);
        this.ring.object3D.scale.set(0, 0, 0);
        this.el.appendChild(this.ring);

        // Dot centrale
        this.dot = document.createElement('a-sphere');
        this.dot.setAttribute('radius', '0.045');
        this.dot.setAttribute('material', 'color:#ffffff; emissive:#ffffff; emissiveIntensity:1; shader:flat');
        this.dot.object3D.scale.set(0, 0, 0);
        this.el.appendChild(this.dot);

        // Trigger gaze — NON scalato con il resto, sempre a scala 1 nel world
        // così il raycaster lo colpisce anche quando hotspot è "nascosto"
        this.trigger = document.createElement('a-sphere');
        this.trigger.setAttribute('radius', '0.35');
        this.trigger.setAttribute('class', 'hotspot-trigger');
        this.trigger.setAttribute('material', 'opacity:0; transparent:true; shader:flat');
        this.el.appendChild(this.trigger);

        // Pannello info — no look-at component, lo orientiamo nel tick
        this.panel = document.createElement('a-entity');
        this.panel.setAttribute('position', '0 0.8 0');
        this.panel.object3D.scale.set(0, 0, 0);

        const bg = document.createElement('a-plane');
        bg.setAttribute('width', '1.9'); bg.setAttribute('height', '0.9');
        bg.setAttribute('material', 'color:#0a001a; opacity:0.96; transparent:true; side:double');
        this.panel.appendChild(bg);

        const bar = document.createElement('a-box');
        bar.setAttribute('position', '0 0.41 0.002');
        bar.setAttribute('width', '1.9'); bar.setAttribute('height', '0.085'); bar.setAttribute('depth', '0.004');
        bar.setAttribute('material', `color:${d.color}; emissive:${d.color}; emissiveIntensity:0.9; shader:flat`);
        this.panel.appendChild(bar);

        const title = document.createElement('a-text');
        title.setAttribute('value', d.title.toUpperCase());
        title.setAttribute('align', 'center'); title.setAttribute('color', '#ffffff');
        title.setAttribute('width', '1.7'); title.setAttribute('position', '0 0.24 0.01');
        title.setAttribute('wrap-count', '24');
        title.setAttribute('font', 'exo2bold');
        title.setAttribute('letter-spacing', '2');
        this.panel.appendChild(title);

        const sep = document.createElement('a-box');
        sep.setAttribute('position', '0 0.12 0.002');
        sep.setAttribute('width', '1.7'); sep.setAttribute('height', '0.007'); sep.setAttribute('depth', '0.003');
        sep.setAttribute('material', `color:${d.color}; emissive:${d.color}; emissiveIntensity:0.5; shader:flat`);
        this.panel.appendChild(sep);

        const body = document.createElement('a-text');
        body.setAttribute('value', d.body);
        body.setAttribute('align', 'center'); body.setAttribute('color', '#ccaaff');
        body.setAttribute('width', '1.6'); body.setAttribute('position', '0 -0.16 0.01');
        body.setAttribute('wrap-count', '34');
        body.setAttribute('font', 'exo2semibold');
        this.panel.appendChild(body);

        this.el.appendChild(this.panel);

        // Camera ref per lookAt manuale (più efficiente di look-at component)
        this._cam = null;
        this._wp = new THREE.Vector3(); // [OTTIMIZZAZIONE RAM]: pre-allocato per evitare Garbage Collection lag
        document.querySelector('a-scene').addEventListener('loaded', () => {
          this._cam = document.getElementById('cam');
        });

        // Il pannello apre/chiude solo se l'hotspot è visibile
        this.trigger.addEventListener('mouseenter', () => {
          if (this._visible) this._panelTgt = 1;
        });
        this.trigger.addEventListener('mouseleave', () => { this._panelTgt = 0; });
      },

      setVisible: function (v) {
        this._visible = v;
        if (!v) this._panelTgt = 0;
      },

      tick: function (time, delta) {
        // Fade in/out di ring e dot (NON dell'entity root)
        const tgt = this._visible ? 1 : 0;
        if (Math.abs(this._visScale - tgt) > 0.005) {
          this._visScale += (tgt - this._visScale) * Math.min(delta / 300 * 5, 1);
        } else {
          this._visScale = tgt;
        }
        this.ring.object3D.scale.setScalar(this._visScale);
        this.dot.object3D.scale.setScalar(this._visScale);

        if (this._visScale > 0.05) {
          // Pulsazione anello
          this._pulseT = (this._pulseT + delta) % 1600;
          const p = this._pulseT / 1600;
          const s = this._visScale * (1 + Math.sin(p * Math.PI * 2) * 0.22);
          this.ring.object3D.scale.setScalar(s);
          if (this.ring.components.material)
            this.ring.components.material.material.opacity = 0.55 + Math.sin(p * Math.PI * 2) * 0.45;
        }

        // Pannello info
        if (Math.abs(this._panelOpen - this._panelTgt) > 0.005) {
          this._panelOpen += (this._panelTgt - this._panelOpen) * Math.min(delta / 280 * 5, 1);
        } else {
          this._panelOpen = this._panelTgt;
        }
        this.panel.object3D.scale.setScalar(this._panelOpen);

        // Orienta pannello verso camera (solo quando aperto)
        if (this._panelOpen > 0.05 && this._cam) {
          this._cam.object3D.getWorldPosition(this._wp);
          this.panel.object3D.lookAt(this._wp);
        }
      }
    });

    // ── Particelle Three.js native ────────────────────────────────────────────
    AFRAME.registerComponent('spark-particles', {
      schema: {
        count:  { type: 'number', default: 80 },
        radius: { type: 'number', default: 2.6 },
        color1: { type: 'color',  default: '#cc44ff' },
        color2: { type: 'color',  default: '#aaaaff' }
      },
      init: function () {
        const d = this.data, N = d.count;
        const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
        const vel = new Float32Array(N * 3), ages = new Float32Array(N), lives = new Float32Array(N);
        const c1 = new THREE.Color(d.color1), c2 = new THREE.Color(d.color2);

        const reset = (i) => {
          const a = Math.random() * Math.PI * 2;
          const r = d.radius * (0.88 + Math.random() * 0.12);
          pos[i*3] = Math.cos(a)*r; pos[i*3+1] = (Math.random()-.5)*.08; pos[i*3+2] = Math.sin(a)*r;
          vel[i*3] = Math.cos(a)*Math.random()*.2; vel[i*3+1] = .3+Math.random()*1.1; vel[i*3+2] = Math.sin(a)*Math.random()*.2;
          ages[i] = Math.random()*2.5; lives[i] = 1.4+Math.random()*1.6;
          const c = new THREE.Color().lerpColors(c1, c2, Math.random());
          col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
        };
        for (let i=0; i<N; i++) reset(i);

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
        const mat = new THREE.PointsMaterial({
          size:.06, vertexColors:true, transparent:true, opacity:.8,
          blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
        });
        this.points = new THREE.Points(geo, mat);
        this.el.object3D.add(this.points);
        this._pos=pos; this._vel=vel; this._ages=ages; this._lives=lives;
        this._N=N; this._reset=reset; this._geo=geo;
      },
      tick: function (time, delta) {
        const dt = Math.min(delta/1000, .05);
        for (let i=0; i<this._N; i++) {
          this._ages[i] += dt;
          if (this._ages[i] >= this._lives[i]) { this._reset(i); this._ages[i]=0; continue; }
          this._vel[i*3+1] -= .45*dt;
          this._pos[i*3]   += this._vel[i*3]  *dt;
          this._pos[i*3+1] += this._vel[i*3+1]*dt;
          this._pos[i*3+2] += this._vel[i*3+2]*dt;
        }
        this._geo.attributes.position.needsUpdate = true;
      },
      remove: function () { this.el.object3D.remove(this.points); }
    });

    // ── Centra il GLB sul parent usando il bbox reale (ignora pivot errato) ────
    AFRAME.registerComponent('center-on-platform', {
      schema: {
        baseY: { type: 'number', default: 0.11 },
        targetLength: { type: 'number', default: 0 }, // 0 = nessuna normalizzazione scala
        useBboxY: { type: 'boolean', default: true }, // Se true, appoggia il min.y. Se false, usa baseY + offsetY
        offsetX: { type: 'number', default: 0 },
        offsetY: { type: 'number', default: 0 },
        offsetZ: { type: 'number', default: 0 }
      },
      init: function () {
          this._scaledOnce = false;
          this._center = () => {
            // Piccolo delay per dare tempo al decoder Draco di popolare le geometrie reali
            setTimeout(() => this.center(), 100);
          };
          this._onTransformChanged = (e) => {
            const name = e && e.detail ? e.detail.name : '';
            if (name === 'position' || name === 'rotation' || name === 'scale') this.center();
          };
          this.el.addEventListener('model-loaded', this._center);
          this.el.addEventListener('componentchanged', this._onTransformChanged);
          if (this.el.getObject3D('mesh')) this._center();
        },
      center: function () {
        if (!this.el.getObject3D('mesh') || !this.el.parentEl) return;

        // Assicurati che le bounding box siano calcolate (specialmente post-Draco)
        this.el.object3D.traverse(child => {
          if (child.isMesh && child.geometry) {
            child.geometry.computeBoundingBox();
            child.geometry.computeBoundingSphere();
          }
        });

        const parentObj = this.el.parentEl.object3D;
        const box = new THREE.Box3().setFromObject(this.el.object3D);
        if (box.isEmpty()) return;

        // Normalizza la scala una sola volta in base alla lunghezza reale del modello.
        if (!this._scaledOnce && this.data.targetLength > 0) {
          const size = box.getSize(new THREE.Vector3());
          const currentLength = Math.max(size.x, size.z);
          if (currentLength > 0.0001) {
            const factor = this.data.targetLength / currentLength;
            this.el.object3D.scale.multiplyScalar(factor);
            this._scaledOnce = true;
          }
        }

        const fitBox = new THREE.Box3().setFromObject(this.el.object3D);
        if (fitBox.isEmpty()) return;

        const centerW = fitBox.getCenter(new THREE.Vector3());
        const bottomW = new THREE.Vector3(centerW.x, fitBox.min.y, centerW.z);

        const centerL = parentObj.worldToLocal(centerW.clone());
        const bottomL = parentObj.worldToLocal(bottomW.clone());

        const p = this.el.object3D.position;
        p.x -= centerL.x + this.data.offsetX;            // centra su X
        p.z -= centerL.z + this.data.offsetZ;            // centra su Z
        
        if (this.data.useBboxY) {
          p.y += (this.data.baseY - bottomL.y) + this.data.offsetY; // appoggia in Y usando bbox + offset manuale
        } else {
          // Se la bbox contiene ombre/piani invisibili, impostiamo Y manualmente
          p.y = this.data.baseY + this.data.offsetY;
        }
      },
      remove: function () {
        this.el.removeEventListener('model-loaded', this._center);
        this.el.removeEventListener('componentchanged', this._onTransformChanged);
      }
    });

    // ── Teleport Pad Gaze Component (Olografico e Fluido) ─────────────────────
    AFRAME.registerComponent('teleport-pad', {
      schema: { target: { type: 'vec3' } },
      init: function () {
        this.hovering = false;
        this.timer = 0;
        this.ring = this.el.querySelector('.tele-ring');
        this.hit = this.el.querySelector('.tele-hit');
        
        // Animazione pulsante sull'anello esterno (neon)
        this.neon = this.el.querySelector('.tele-neon');
        this.baseIntensity = 0.8;
        this.timeOffset = Math.random() * 1000;

        const startHover = () => { this.hovering = true; };
        const endHover = () => { 
          this.hovering = false; 
          this.timer = 0; 
          if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', 0); 
        };

        if (this.hit) {
          this.hit.addEventListener('mouseenter', startHover);
          this.hit.addEventListener('mouseleave', endHover);
          // Se per qualche motivo clicca prima che finisca l'animazione visiva
          this.hit.addEventListener('click', () => { this.timer = 1000; });
        }
      },
      tick: function (time, delta) {
        // [OTTIMIZZAZIONE]: Effetto pulsazione idle con bypass di aframe setAttribute (zero start/stop lag)
        if (this.neon) {
          const intensity = this.baseIntensity + Math.sin((time + this.timeOffset) / 200) * 0.3;
          const mesh = this.neon.getObject3D('mesh');
          if (mesh && mesh.material) mesh.material.emissiveIntensity = intensity;
        }

        if (!this.hovering) return;
        this.timer += delta;
        if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', Math.min((this.timer / 1000) * 360, 360));
        
        if (this.timer >= 1000) {
          this.hovering = false;
          this.timer = 0;
          if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', 0);
          
          // Spostamento fluido del RIG
          const t = this.data.target;
          document.getElementById('rig').setAttribute('animation', `property: position; to: ${t.x} ${t.y} ${t.z}; dur: 900; easing: easeInOutCubic`);
        }
      }
    });

    // ── Etichetta Fluttuante per i Pad ────────────────────────────────────────
    AFRAME.registerComponent('pad-label', {
      init: function () {
        this._cam = null;
        this.baseY = this.el.object3D.position.y;
        this.wpCam = new THREE.Vector3();
        this.wpMe = new THREE.Vector3();
        this.el.sceneEl.addEventListener('loaded', () => {
          this._cam = document.getElementById('cam');
        });
      },
      tick: function (time, delta) {
        if (!this._cam) return;
        
        this._t = (this._t || 0) + delta;

        if (this.el.object3D.visible) {
          // Bobbing (fluttuazione su e giù fluida frame-by-frame)
          this.el.object3D.position.y = this.baseY + Math.sin(time / 400) * 0.08;
          
          // Guarda sempre la telecamera
          this.wpCam.y = this.el.object3D.position.y;
          this.el.object3D.lookAt(this.wpCam);
        }

        // [OTTIMIZZAZIONE]: Esegue la misurazione della distanza solo ogni 250ms
        if (this._t > 250) {
          this._t = 0;
          this._cam.object3D.getWorldPosition(this.wpCam);
          this.el.object3D.getWorldPosition(this.wpMe);
          const dist = Math.hypot(this.wpCam.x - this.wpMe.x, this.wpCam.z - this.wpMe.z);
          this.el.object3D.visible = dist > 1.8;
        }
      }
    });

    // ── Nasconde gruppi di elementi se lontani ────────────────────────────────
    AFRAME.registerComponent('hide-when-far', {
      schema: { maxDist: { type: 'number', default: 4.5 } },
      init: function () {
        this._cam = null;
        this.wpCam = new THREE.Vector3();
        this.wpMe = new THREE.Vector3();
        this.el.sceneEl.addEventListener('loaded', () => {
          this._cam = document.getElementById('cam');
        });
      },
      tick: function (time, delta) {
        if (!this._cam) return;
        
        // [OTTIMIZZAZIONE]: Misura del range eseguita 4 volte al secondo (e non frame-by-frame)
        this._t = (this._t || 0) + delta;
        if (this._t < 250) return;
        this._t = 0;

        this._cam.object3D.getWorldPosition(this.wpCam);
        this.el.object3D.getWorldPosition(this.wpMe);
        
        const dist = Math.hypot(this.wpCam.x - this.wpMe.x, this.wpCam.z - this.wpMe.z);
        const inRange = dist <= this.data.maxDist;
        
        if (this.el.object3D.visible !== inRange) {
          this.el.object3D.visible = inRange;
          // Se la scala viene portata a 0 disabilita automaticamente il target del raycaster
          this.el.object3D.scale.setScalar(inRange ? 1 : 0);
        }
      }
    });

    // ── Chiudi Pannello Benvenuto ──────────────────────────────────────────────
    AFRAME.registerComponent('close-welcome', {
      init: function () {
        this.hovering = false;
        this.timer = 0;
        this.ring = this.el.querySelector('.btn-ring');
        
        // Attacchiamo gli eventi anche al piano che fa da "hitbox" visibile al raycaster
        const hitbox = this.el.querySelector('a-plane.gaze-target');
        if (hitbox) {
          hitbox.addEventListener('mouseenter', () => { this.hovering = true; });
          hitbox.addEventListener('mouseleave', () => { 
            this.hovering = false; 
            this.timer = 0; 
            if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', 0); 
          });
          hitbox.addEventListener('click', () => { this.timer = 800; });
        }
      },
      tick: function (time, delta) {
        if (!this.hovering) return;
        this.timer += delta;
        if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', Math.min((this.timer / 800) * 360, 360));
        
        if (this.timer >= 800) {
          this.hovering = false;
          this.timer = 0;
          if (this.ring) this.ring.setAttribute('geometry', 'thetaLength', 0);

      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>

    </div>

    <script>
      // Gestione caricamento
      window.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('loading-screen');
        const bar = document.getElementById('progress-bar');
        let progress = 0;
        
        // Simula il caricamento in modo fluido fino al 90%
        const interval = setInterval(() => {
          // Incrementa randomicamente tra l'1% e il 4%
          progress += Math.random() * 3 + 1;
          if (progress > 90) progress = 90;
          bar.style.width = progress + '%';
        }, 150);

        // Quando A-Frame e tutti i suoi assets sono pronti
        const sceneEl = document.querySelector('a-scene');
        if (sceneEl.hasLoaded) {
          finishLoading();
        } else {
          sceneEl.addEventListener('loaded', finishLoading);
        }

        function finishLoading() {
          clearInterval(interval);
          bar.style.width = '100%'; // Salta direttamente al completamento
          
          setTimeout(() => {
            loader.style.opacity = '0'; // Avvia l'animazione CSS di dissolvenza
            setTimeout(() => {
              loader.remove(); // Rimuovi dal DOM una volta scomparsa
            }, 600);
          }, 400); // Piccola pausa per permettere all'utente di vedere il caricamento al 100%
        }
      });

      <!-- ═══ SCRIPT TEXTURE PAVIMENTO ════════════════════════════════════════ -->
      <script>
        (function() {
          const c = document.getElementById('floor-tex');
          const ctx = c.getContext('2d');
          const w = 256, h = 256;
          ctx.fillStyle = '#b8b0a4'; ctx.fillRect(0,0,w,h);
          const grad = ctx.createLinearGradient(0,0,w,h);
          grad.addColorStop(0,   'rgba(180,172,162,0.6)');
          grad.addColorStop(0.5, 'rgba(160,152,144,0.4)');
          grad.addColorStop(1,   'rgba(175,167,157,0.6)');
          ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
          ctx.strokeStyle = 'rgba(210,205,198,0.35)'; ctx.lineWidth = 0.8;
          for (let i=0; i<18; i++) {
            ctx.beginPath();
            const x0=Math.random()*w, y0=Math.random()*h; ctx.moveTo(x0,y0);
            for (let j=0;j<6;j++) ctx.lineTo(x0+(Math.random()-.5)*80, y0+(Math.random()-.5)*80);
            ctx.stroke();
          }
          ctx.strokeStyle='rgba(100,95,88,0.12)'; ctx.lineWidth=0.5;
          for (let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(Math.random()*w,Math.random()*h);ctx.lineTo(Math.random()*w,Math.random()*h);ctx.stroke();}
          ctx.strokeStyle='rgba(80,75,68,0.4)'; ctx.lineWidth=1.2;
          for (let x=0;x<=w;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
          for (let y=0;y<=h;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
        })();
      </script>

      <!-- ═══ SCRIPT LOGO CANVAS ══════════════════════════════════════════════ -->
      <script>
        (function() {
          const img = document.getElementById('logo-img');
          const cv  = document.getElementById('logo-canvas');

          function process() {
            cv.width  = img.naturalWidth  || 1624;
            cv.height = img.naturalHeight || 1183;
            const ctx = cv.getContext('2d');
            ctx.clearRect(0, 0, cv.width, cv.height);
            ctx.drawImage(img, 0, 0, cv.width, cv.height);
            const data = ctx.getImageData(0, 0, cv.width, cv.height);
            const d = data.data;
            for (let i = 0; i < d.length; i += 4) {
              if (d[i] < 40 && d[i+1] < 40 && d[i+2] < 40) d[i+3] = 0;
            }
            ctx.putImageData(data, 0, 0);
            // Forza aggiornamento texture Three.js
            const tryRefresh = () => {
              const el = document.getElementById('logo-plane');
              if (el && el.components && el.components.material) {
                const mat = el.components.material.material;
                if (mat && mat.map) { mat.map.needsUpdate = true; mat.needsUpdate = true; }
              }
            };
            const scene = document.querySelector('a-scene');
            if (scene && scene.hasLoaded) tryRefresh();
            else if (scene) scene.addEventListener('loaded', () => setTimeout(tryRefresh, 100));
          }

          if (img.complete && img.naturalWidth > 0) process();
          else img.addEventListener('load', process);
        })();
      </script>

      <!-- ═══ SCRIPT BOKEH CANVAS ═════════════════════════════════════════════ -->
      <script>
        (function() {
          const c = document.getElementById('bokeh-tex');
          const ctx = c.getContext('2d');
          const w = c.width, h = c.height;
          ctx.clearRect(0, 0, w, h);
          const g = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
          g.addColorStop(0.0, 'rgba(255,255,255,0.46)');
          g.addColorStop(0.35, 'rgba(255,255,255,0.22)');
          g.addColorStop(0.7, 'rgba(255,255,255,0.08)');
          g.addColorStop(1.0, 'rgba(255,255,255,0.0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, w, h);
        })();
      </script>

      <!-- ═══ SCRIPT PANNELLI GAZE ════════════════════════════════════════════ -->
      <script>
        window.addEventListener('load', () => {
          [['t1','b1'],['t2','b2'],['t3','b3'],['t4','b4']].forEach(([tid, bid]) => {
            const tr = document.getElementById(tid);
            const bd = document.getElementById(bid);
            tr.addEventListener('mouseenter', () => { if(bd.components['gaze-body']) bd.components['gaze-body']._t = 1; });
            tr.addEventListener('mouseleave', () => { if(bd.components['gaze-body']) bd.components['gaze-body']._t = 0; });
          });
        });
