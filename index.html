<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Car Dealership VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>

    AFRAME.registerComponent('rotate-y', {
      schema: { speed: { type: 'number', default: 0.3 } },
      tick: function (time, delta) {
        this.el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed) * (delta / 1000) * 60;
      }
    });

    AFRAME.registerComponent('gaze-body', {
      schema: { duration: { type: 'number', default: 350 } },
      init: function () {
        this._s = 0; this._t = 0;
        this.el.object3D.scale.set(0, 0, 0);
        this.el.addEventListener('mouseenter', () => { this._t = 1; });
        this.el.addEventListener('mouseleave', () => { this._t = 0; });
      },
      tick: function (time, delta) {
        if (Math.abs(this._s - this._t) < 0.005) {
          this._s = this._t;
          this.el.object3D.scale.setScalar(this._s);
          return;
        }
        this._s += (this._t - this._s) * Math.min((delta / this.data.duration) * 5, 1);
        this.el.object3D.scale.setScalar(this._s);
      }
    });

    // Anello pulsante per gli hotspot
    AFRAME.registerComponent('pulse-ring', {
      schema: {
        color:    { type: 'color',  default: '#8800ee' },
        duration: { type: 'number', default: 1600 }
      },
      init: function () {
        this._t = 0;
        // Torus sottile come ring
        this.ring = document.createElement('a-torus');
        this.ring.setAttribute('radius', '0.12');
        this.ring.setAttribute('radius-tubular', '0.012');
        this.ring.setAttribute('rotation', '90 0 0');
        this.ring.setAttribute('material',
          `color: ${this.data.color}; emissive: ${this.data.color}; emissiveIntensity: 1.2; shader: flat; transparent: true`);
        this.el.appendChild(this.ring);
        // Dot centrale
        this.dot = document.createElement('a-sphere');
        this.dot.setAttribute('radius', '0.04');
        this.dot.setAttribute('material',
          `color: #ffffff; emissive: #ffffff; emissiveIntensity: 1; shader: flat`);
        this.el.appendChild(this.dot);
      },
      tick: function (time, delta) {
        this._t = (this._t + delta) % this.data.duration;
        const p = this._t / this.data.duration;           // 0→1
        const s = 1 + Math.sin(p * Math.PI * 2) * 0.25;  // scala 0.75→1.25
        const op = 0.6 + Math.sin(p * Math.PI * 2) * 0.4;
        this.ring.object3D.scale.set(s, s, s);
        this.ring.components.material &&
          (this.ring.components.material.material.opacity = op);
      }
    });

    // Hotspot: mostra pannello info al mouseenter, nasconde al mouseleave
    AFRAME.registerComponent('hotspot', {
      schema: {
        title:   { type: 'string', default: 'Info' },
        body:    { type: 'string', default: '' },
        color:   { type: 'color',  default: '#8800ee' },
        panelOffset: { type: 'vec3', default: {x: 0, y: 0.55, z: 0} }
      },
      init: function () {
        const d = this.data;
        // Trigger invisibile
        const trigger = document.createElement('a-sphere');
        trigger.setAttribute('radius', '0.18');
        trigger.setAttribute('class', 'gaze-target hotspot-trigger');
        trigger.setAttribute('material', 'opacity: 0; transparent: true; shader: flat');
        this.el.appendChild(trigger);

        // Pannello info
        this.panel = document.createElement('a-entity');
        const po = d.panelOffset;
        this.panel.setAttribute('position', `${po.x} ${po.y} ${po.z}`);
        this.panel.object3D.scale.set(0, 0, 0);

        // Sfondo pannello
        const bg = document.createElement('a-plane');
        bg.setAttribute('width',  '1.8');
        bg.setAttribute('height', '0.85');
        bg.setAttribute('material', `color: #0d0020; opacity: 0.97; transparent: true; side: double`);
        this.panel.appendChild(bg);

        // Bordo superiore colorato
        const bar = document.createElement('a-box');
        bar.setAttribute('position', `0 0.38 0.002`);
        bar.setAttribute('width', '1.8'); bar.setAttribute('height', '0.08'); bar.setAttribute('depth', '0.005');
        bar.setAttribute('material', `color: ${d.color}; emissive: ${d.color}; emissiveIntensity: 0.9; shader: flat`);
        this.panel.appendChild(bar);

        // Titolo
        const title = document.createElement('a-text');
        title.setAttribute('value', d.title.toUpperCase());
        title.setAttribute('align', 'center');
        title.setAttribute('color', '#ffffff');
        title.setAttribute('width', '1.6');
        title.setAttribute('position', '0 0.22 0.01');
        title.setAttribute('wrap-count', '22');
        this.panel.appendChild(title);

        // Linea separatrice
        const sep = document.createElement('a-box');
        sep.setAttribute('position', `0 0.1 0.002`);
        sep.setAttribute('width', '1.6'); sep.setAttribute('height', '0.008'); sep.setAttribute('depth', '0.004');
        sep.setAttribute('material', `color: ${d.color}; emissive: ${d.color}; emissiveIntensity: 0.6; shader: flat`);
        this.panel.appendChild(sep);

        // Corpo testo
        const body = document.createElement('a-text');
        body.setAttribute('value', d.body);
        body.setAttribute('align', 'center');
        body.setAttribute('color', '#ccaaff');
        body.setAttribute('width', '1.5');
        body.setAttribute('position', '0 -0.12 0.01');
        body.setAttribute('wrap-count', '32');
        this.panel.appendChild(body);

        this.el.appendChild(this.panel);

        // Billboard: il pannello guarda sempre la camera
        this.panel.setAttribute('look-at', '[camera]');

        // Gaze events
        this._tgt = 0; this._cur = 0;
        trigger.addEventListener('mouseenter', () => { this._tgt = 1; });
        trigger.addEventListener('mouseleave', () => { this._tgt = 0; });
      },
      tick: function (time, delta) {
        if (Math.abs(this._cur - this._tgt) < 0.005) {
          this._cur = this._tgt;
          this.panel.object3D.scale.setScalar(this._cur);
          return;
        }
        this._cur += (this._tgt - this._cur) * Math.min((delta / 280) * 5, 1);
        this.panel.object3D.scale.setScalar(this._cur);
      }
    });

    // ── Particelle Three.js native — niente dipendenze esterne ──────────────
    AFRAME.registerComponent('spark-particles', {
      schema: {
        count:  { type: 'number', default: 220 },
        radius: { type: 'number', default: 2.6 },
        color1: { type: 'color',  default: '#cc44ff' },
        color2: { type: 'color',  default: '#ffffff' }
      },
      init: function () {
        const d = this.data;
        const N = d.count;
        const pos   = new Float32Array(N * 3);
        const col   = new Float32Array(N * 3);
        const vel   = new Float32Array(N * 3);
        const ages  = new Float32Array(N);
        const lives = new Float32Array(N);
        const c1 = new THREE.Color(d.color1);
        const c2 = new THREE.Color(d.color2);

        const reset = (i) => {
          const angle = Math.random() * Math.PI * 2;
          const r = d.radius * (0.85 + Math.random() * 0.15);
          pos[i*3]   = Math.cos(angle) * r;
          pos[i*3+1] = (Math.random() - 0.5) * 0.1;
          pos[i*3+2] = Math.sin(angle) * r;
          vel[i*3]   = Math.cos(angle) * (Math.random() * 0.3);
          vel[i*3+1] = 0.4 + Math.random() * 1.4;
          vel[i*3+2] = Math.sin(angle) * (Math.random() * 0.3);
          ages[i]  = Math.random() * 2.5;
          lives[i] = 1.5 + Math.random() * 1.8;
          const c = new THREE.Color().lerpColors(c1, c2, Math.random());
          col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
        };
        for (let i = 0; i < N; i++) reset(i);

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
        const mat = new THREE.PointsMaterial({
          size: 0.07, vertexColors: true, transparent: true, opacity: 0.85,
          blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
        });
        this.points = new THREE.Points(geo, mat);
        this.el.object3D.add(this.points);
        this._pos = pos; this._vel = vel;
        this._ages = ages; this._lives = lives;
        this._N = N; this._reset = reset; this._geo = geo;
      },
      tick: function (time, delta) {
        const dt = Math.min(delta / 1000, 0.05);
        const pos = this._pos, vel = this._vel;
        const ages = this._ages, lives = this._lives;
        for (let i = 0; i < this._N; i++) {
          ages[i] += dt;
          if (ages[i] >= lives[i]) { this._reset(i); ages[i] = 0; continue; }
          vel[i*3+1] -= 0.5 * dt;
          pos[i*3]   += vel[i*3]   * dt;
          pos[i*3+1] += vel[i*3+1] * dt;
          pos[i*3+2] += vel[i*3+2] * dt;
        }
        this._geo.attributes.position.needsUpdate = true;
      },
      remove: function () { this.el.object3D.remove(this.points); }
    });

    </script>
  </head>
  <body>
    <a-scene
      background="color: #282828"
      vr-mode-ui="enabled: true"
      renderer="antialias: true; colorManagement: true"
    >

      <!-- ═══ ASSETS ══════════════════════════════════════════════════════════ -->
      <a-assets timeout="10000">
        <canvas id="floor-tex" width="256" height="256"></canvas>
        <img id="logo-img" src="logo.png" crossorigin="anonymous">
        <a-asset-item id="auto" src="macchina_test.glb"></a-asset-item>
      </a-assets>

      <!-- ═══ LUCI ════════════════════════════════════════════════════════════
           Niente ambient alto o directional forti — tutto brucia su pareti chiare.
           Usiamo point lights localizzate che simulano le strip LED a soffitto.
      ══════════════════════════════════════════════════════════════════════════ -->
      <a-light type="ambient" color="#888888" intensity="0.3"></a-light>

      <!-- Strip LED soffitto: 4 point lights lungo la navata centrale -->
      <a-light type="point" position="-3 8.5 -2"  color="#fffaf0" intensity="1.4" distance="11"></a-light>
      <a-light type="point" position=" 3 8.5 -2"  color="#fffaf0" intensity="1.4" distance="11"></a-light>
      <a-light type="point" position="-3 8.5 -8"  color="#fffaf0" intensity="1.2" distance="10"></a-light>
      <a-light type="point" position=" 3 8.5 -8"  color="#fffaf0" intensity="1.2" distance="10"></a-light>

      <!-- Spot dedicato sulla macchina — punta verso il centro piattaforma -->
      <!-- A-Frame spot con target: usiamo rotation calcolata manualmente -->
      <!-- da pos=(0,7,-6) verso (0,0.5,-6): direzione Y=-6.5, Z=0 → pitch=-90° -->
      <a-light type="spot" position="0 7 -6"
        rotation="-90 0 0"
        color="#ffffff" intensity="3.5" angle="28" penumbra="0.4">
      </a-light>
      <!-- Spot secondari laterali sulla macchina per illuminarla da più angoli -->
      <a-light type="spot" position="-3 6 -6"
        rotation="-75 20 0"
        color="#fff0e0" intensity="1.5" angle="22" penumbra="0.5">
      </a-light>
      <a-light type="spot" position=" 3 6 -6"
        rotation="-75 -20 0"
        color="#e0f0ff" intensity="1.5" angle="22" penumbra="0.5">
      </a-light>

      <!-- Zona attesa — luce calda -->
      <a-light type="point" position="-8 3.5  2"  color="#ffd580" intensity="1.0" distance="7"></a-light>
      <a-light type="point" position="-8 3.5 -4"  color="#ffd580" intensity="0.9" distance="6"></a-light>

      <!-- Zona reception -->
      <a-light type="point" position="9 3.5 -2"   color="#fffaf0" intensity="1.0" distance="7"></a-light>

      <!-- Accent piattaforma dal basso — viola -->
      <a-light type="point" position="0 -0.3 -6"  color="#9933ff" intensity="0.9" distance="4"></a-light>

      <!-- ═══ SHOWROOM ═════════════════════════════════════════════════════════ -->

      <!-- Pavimento — marmo grigio-beige con griglia sottile generata via canvas -->
      <a-plane id="floor" position="0 -0.51 -3" rotation="-90 0 0" width="28" height="22"
        material="src: #floor-tex; repeat: 14 11; metalness:0.25; roughness:0.35"></a-plane>

      <!-- Pareti — antracite caldo, moderno -->
      <a-plane position="0 4 -14"   rotation="0 0 0"    width="28" height="10" color="#2e2e2e" material="roughness:0.85"></a-plane>
      <a-plane position="-12 4 -3"  rotation="0  90 0"  width="22" height="10" color="#2e2e2e" material="roughness:0.85"></a-plane>
      <a-plane position=" 12 4 -3"  rotation="0 -90 0"  width="22" height="10" color="#2c2c2c" material="roughness:0.85"></a-plane>
      <a-plane position="0 4 5"     rotation="0 180 0"  width="28" height="10" color="#2e2e2e" material="roughness:0.85"></a-plane>
      <!-- Soffitto metallico acciaio scuro -->
      <a-plane position="0 9 -3"    rotation="90 0 0"   width="28" height="22"
        color="#3a3a3a" material="metalness:0.85; roughness:0.25"></a-plane>

      <!-- Vetrata frontale con montanti -->
      <a-box position="-6  4 -13.95" width="0.15" height="10" depth="0.1" color="#555555"></a-box>
      <a-box position=" 0  4 -13.95" width="0.15" height="10" depth="0.1" color="#555555"></a-box>
      <a-box position=" 6  4 -13.95" width="0.15" height="10" depth="0.1" color="#555555"></a-box>
      <a-box position="-12 4 -13.95" width="0.15" height="10" depth="0.1" color="#555555"></a-box>
      <a-box position=" 12 4 -13.95" width="0.15" height="10" depth="0.1" color="#555555"></a-box>
      <a-box position="0 2 -13.95"   width="28"   height="0.1" depth="0.1" color="#555555"></a-box>
      <a-box position="0 6 -13.95"   width="28"   height="0.1" depth="0.1" color="#555555"></a-box>
      <!-- Pannelli vetro (colore cielo, meno saturo) -->
      <a-plane position="-9 4 -13.9" width="5.7" height="7.8" material="color:#b8d4e8; opacity:0.22; transparent:true; side:double"></a-plane>
      <a-plane position="-3 4 -13.9" width="5.7" height="7.8" material="color:#b8d4e8; opacity:0.22; transparent:true; side:double"></a-plane>
      <a-plane position=" 3 4 -13.9" width="5.7" height="7.8" material="color:#b8d4e8; opacity:0.22; transparent:true; side:double"></a-plane>
      <a-plane position=" 9 4 -13.9" width="5.7" height="7.8" material="color:#b8d4e8; opacity:0.22; transparent:true; side:double"></a-plane>

      <!-- Travi soffitto -->
      <a-box position="-8 8.8 -3" width="0.3" height="0.4" depth="22" color="#2a2a2a"></a-box>
      <a-box position=" 8 8.8 -3" width="0.3" height="0.4" depth="22" color="#2a2a2a"></a-box>
      <!-- Travetti centrali per gli spot -->
      <a-box position="0 8.8 -6"  width="0.2" height="0.3" depth="6"  color="#2a2a2a"></a-box>
      <!-- Strip LED soffitto (mesh visuale) — ora più sottili e distanziate -->
      <a-box position="-3 8.95 -3" width="0.08" height="0.05" depth="18" color="#fffaf0" material="emissive:#fffaf0; emissiveIntensity:0.9"></a-box>
      <a-box position=" 3 8.95 -3" width="0.08" height="0.05" depth="18" color="#fffaf0" material="emissive:#fffaf0; emissiveIntensity:0.9"></a-box>

      <!-- Fascia viola brand -->
      <a-box position="0 0.5 -13.92"  width="28"   height="0.1" depth="0.05" color="#7700cc" material="emissive:#7700cc; emissiveIntensity:0.4"></a-box>
      <a-box position="0 0.5  4.92"   width="28"   height="0.1" depth="0.05" color="#7700cc" material="emissive:#7700cc; emissiveIntensity:0.3"></a-box>
      <a-box position="-11.92 0.5 -3" width="0.05" height="0.1" depth="22"   color="#7700cc" material="emissive:#7700cc; emissiveIntensity:0.3"></a-box>
      <a-box position=" 11.92 0.5 -3" width="0.05" height="0.1" depth="22"   color="#7700cc" material="emissive:#7700cc; emissiveIntensity:0.3"></a-box>

      <!-- Logo AVBO CORSE — parete frontale, centrato, grande -->
      <a-plane id="logo-plane"
        position="0 5.2 -13.8"
        rotation="0 0 0"
        width="16" height="9.3"
        material="src: #logo-img; shader: flat; transparent: true; alphaTest: 0.15; side: double">
      </a-plane>

      <!-- ═══ PIATTAFORMA ROTANTE ══════════════════════════════════════════════ -->
      <a-entity position="0 -0.5 -6" rotate-y="speed: 0.25">
        <a-cylinder height="0.1" radius="2.6" color="#1a1a1a" material="metalness:0.9; roughness:0.1"></a-cylinder>
        <a-torus radius="2.6" radius-tubular="0.05" color="#8800ee"
          material="emissive:#8800ee; emissiveIntensity:1; opacity:0.95; transparent:true"
          position="0 0.05 0" rotation="90 0 0">
        </a-torus>
        <a-entity
          gltf-model="#auto"
          rotation="-90 90 0"
          scale="0.02222 0.02222 0.02222"
          position="0 0.156 -2.444">
        </a-entity>
      </a-entity>

      <!-- ═══ SPOT LIGHT 3D SUL SOFFITTO (geometry pura, niente GLB) ══════════ -->
      <!-- Faretti: cilindro scuro + cono emissivo sotto -->
      <a-entity position="0 8.8 -6">
        <a-cylinder height="0.3" radius="0.12" color="#222222" material="metalness:0.9; roughness:0.1" position="0 0 0"></a-cylinder>
        <a-cone height="0.2" radius-bottom="0.18" radius-top="0.08" color="#ffeecc" material="emissive:#ffeecc; emissiveIntensity:0.8; shader:flat; side:double" position="0 -0.22 0" rotation="0 0 0"></a-cone>
      </a-entity>
      <a-entity position="-3 8.8 -6">
        <a-cylinder height="0.3" radius="0.10" color="#222222" material="metalness:0.9; roughness:0.1"></a-cylinder>
        <a-cone height="0.18" radius-bottom="0.15" radius-top="0.07" color="#ffeecc" material="emissive:#ffeecc; emissiveIntensity:0.7; shader:flat; side:double" position="0 -0.2 0"></a-cone>
      </a-entity>
      <a-entity position="3 8.8 -6">
        <a-cylinder height="0.3" radius="0.10" color="#222222" material="metalness:0.9; roughness:0.1"></a-cylinder>
        <a-cone height="0.18" radius-bottom="0.15" radius-top="0.07" color="#ffeecc" material="emissive:#ffeecc; emissiveIntensity:0.7; shader:flat; side:double" position="0 -0.2 0"></a-cone>
      </a-entity>

      <!-- ═══ PARTICELLE — Three.js nativo, niente librerie esterne ════════════ -->
      <a-entity id="particles" position="0 -0.4 -6"
        spark-particles="count: 220; radius: 2.6; color1: #cc44ff; color2: #ffffff">
      </a-entity>

      <!-- ═══ HOTSPOT INTERATTIVI ══════════════════════════════════════════════
           Posizionati nel world space (non ruotano con la macchina).
           La macchina è centrata a world pos (0, -0.5, -6), lunga ~5m sull'asse Z.
           Posizioni approssimate sui punti chiave della vettura F1.
      ══════════════════════════════════════════════════════════════════════════ -->

      <!-- H1 — Cockpit / abitacolo (centro-alto della macchina) -->
      <a-entity
        position="0 1.0 -6"
        pulse-ring="color: #cc44ff"
        hotspot="
          title: Cockpit;
          body: Abitacolo monoscocca in fibra di carbonio.\nRoll hoop integrato.\nVisiera riscaldata anti-appannamento.;
          color: #cc44ff;
          panelOffset: 0 0.6 0">
      </a-entity>

      <!-- H2 — Sistema propulsivo / posteriore -->
      <a-entity
        position="0 0.5 -8.5"
        pulse-ring="color: #ff6600"
        hotspot="
          title: Propulsione;
          body: Sistema pneumatico ad aria compressa.\nCapsule inserite nel posteriore.\nSpinta istantanea senza motore elettrico.;
          color: #ff6600;
          panelOffset: 0 0.6 0">
      </a-entity>

      <!-- H3 — Ruota anteriore sinistra -->
      <a-entity
        position="-1.0 0.0 -4.0"
        pulse-ring="color: #00ccff"
        hotspot="
          title: Pneumatico;
          body: Pirelli P Zero 13\'\'\nComposizione: compound morbido.\nDiametro: 330mm.;
          color: #00ccff;
          panelOffset: 0 0.6 0">
      </a-entity>

      <!-- H4 — Alettone anteriore (anteriore della macchina) -->
      <a-entity
        position="0 0.2 -3.5"
        pulse-ring="color: #00ff88"
        hotspot="
          title: Alettone Anteriore;
          body: Carbonio ad alta resistenza.\nCarico aerodinamico: 400+ kg.\nAngolo regolabile in pit stop.;
          color: #00ff88;
          panelOffset: 0 0.6 0">
      </a-entity>

      <!-- ═══ CAMERA ══════════════════════════════════════════════════════════ -->
      <a-entity camera look-controls="pointerLockEnabled: false" position="0 1.6 0">
        <a-cursor fuse="false"
          raycaster="objects: .gaze-target, .hotspot-trigger; far: 18"
          geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018"
          material="color: #cc44ff; shader: flat; opacity: 0.9">
        </a-cursor>
      </a-entity>

      <!-- ═══ PANNELLI GAZE ════════════════════════════════════════════════════ -->

      <!-- P1 — sinistra, VIOLA -->
      <a-entity position="-2.5 1.6 -1.5" rotation="0 60 0">
        <a-text value="TITOLO 1" align="center" color="#bb44ff" width="2.4" position="0 0.52 0" wrap-count="18"></a-text>
        <a-box position="0 0.32 0" width="0.85" height="0.012" depth="0.005" color="#8800ee" material="emissive:#8800ee; emissiveIntensity:0.8"></a-box>
        <a-plane id="t1" class="gaze-target" width="1.9" height="1.2" position="0 0 0" material="opacity:0; transparent:true; side:double"></a-plane>
        <a-entity id="b1" gaze-body>
          <a-plane width="1.7" height="0.72" position="0 -0.12 -0.005" material="color:#1a0033; opacity:0.95; transparent:true; side:double"></a-plane>
          <a-box position=" 0.84 -0.12 0" width="0.025" height="0.72" depth="0.008" color="#8800ee" material="emissive:#8800ee; emissiveIntensity:1.1"></a-box>
          <a-box position="-0.84 -0.12 0" width="0.025" height="0.72" depth="0.008" color="#8800ee" material="emissive:#8800ee; emissiveIntensity:1.1"></a-box>

      <!-- Script texture pavimento + loghi senza sfondo nero -->
      <script>
        // ── Pavimento ────────────────────────────────────────────────────────
        (function() {
          const c = document.getElementById('floor-tex');
          const ctx = c.getContext('2d');
          const w = 256, h = 256;
          ctx.fillStyle = '#b8b0a4';
          ctx.fillRect(0, 0, w, h);
          const grad = ctx.createLinearGradient(0, 0, w, h);
          grad.addColorStop(0,   'rgba(180,172,162,0.6)');
          grad.addColorStop(0.5, 'rgba(160,152,144,0.4)');
          grad.addColorStop(1,   'rgba(175,167,157,0.6)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
          ctx.strokeStyle = 'rgba(210,205,198,0.35)';
          ctx.lineWidth = 0.8;
          for (let i = 0; i < 18; i++) {
            ctx.beginPath();
            const x0 = Math.random()*w, y0 = Math.random()*h;
            ctx.moveTo(x0, y0);
            for (let j = 0; j < 6; j++) ctx.lineTo(x0+(Math.random()-.5)*80, y0+(Math.random()-.5)*80);
            ctx.stroke();
          }
          ctx.strokeStyle = 'rgba(100,95,88,0.12)'; ctx.lineWidth = 0.5;
          for (let i = 0; i < 10; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random()*w, Math.random()*h);
            ctx.lineTo(Math.random()*w, Math.random()*h);
            ctx.stroke();
          }
          ctx.strokeStyle = 'rgba(80,75,68,0.4)'; ctx.lineWidth = 1.2;
          for (let x = 0; x <= w; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
          for (let y = 0; y <= h; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
        })();
      </script>

      <script>
        window.addEventListener('load', () => {

            tr.addEventListener('mouseleave', () => { if(bd.components['gaze-body']) bd.components['gaze-body']._t = 0; });
